<!DOCTYPE html>
     <html>

<style> 
    body{ 
        background-color:#f5f5f5; 
        font-family: Arial; 
    } 
 
    /* Outer Combined Box */ 
    .outer-box{ 
        width: 900px; 
        margin: 40px auto; 
        padding: 20px; 
        border: 3px solid black; 
        background-color: #ffffff; 
    } 
 
    /* Individual Form Boxes */ 
    .inner-box{ 
        border: 2px solid gray; 
        padding: 15px; 
        background-color: #fafafa; 
    } 
 
    h2, h3{ 
        text-align:center; 
    } 
 
    table{ 
        margin:auto; 
    } 
</style> 
</head> 

     <body> 

         <h2>Registration Form<br>Bhashini (25034)</h2> 

<!-- OUTER COMBINED BOX --> 

<table class="outer-box"> 

<tr> 

  

<!-- LOGIN BOX --> 
<td> 
    <table class="inner-box"> 
    <tr> 
        <td> 
            <h3>Login</h3> 
 
            <iframe srcdoc=" 
                <html> 
                <body bgcolor='#e8f4ff'> 
                    <h3 align='center'>Employee Login</h3> 
                    <form> 
                        <table border='1' align='center' cellpadding='5' bgcolor='#ffffff'> 
                            <tr> 
                                <td>Email</td> 
                                <td><input type='email'></td> 
                            </tr> 
                            <tr> 
                                <td>Password</td> 
                                <td><input type='password'></td> 
                            </tr> 
                            <tr> 
                                <td colspan='2' align='center'> 
                                    <input type='submit' value='Login'> 
                                    <input type='reset' value='Clear'> 
                                </td> 
                            </tr> 
                        </table> 
                    </form> 
                </body> 
                </html> 
            " width="350" height="230"> 
            </iframe> 
 
        </td> 
    </tr> 
    </table> 
</td> 
 
<!-- REGISTRATION BOX --> 
<td> 
    <table class="inner-box"> 
    <tr> 
        <td> 
            <h3>New User Registration</h3> 
 
            <iframe srcdoc=" 
                <html> 
                <body bgcolor='#fff3e6'> 
                    <h3 align='center'>Register Here</h3> 
                    <form> 
                        <table border='1' align='center' cellpadding='5' bgcolor='#ffffff'> 
                            <tr> 
                                <td>Full Name</td> 
                                <td><input type='text'></td> 
                            </tr> 
                            <tr> 
                                <td>Email</td> 
                                <td><input type='email'></td> 
                            </tr> 
                            <tr> 
                                <td>Mobile</td> 
                                <td><input type='tel'></td> 
                            </tr> 
                            <tr> 
                                <td>Password</td> 
                                <td><input type='password'></td> 
                            </tr> 
                            <tr> 
                                <td>Department</td> 
                                <td> 
                                    <select> 
                                        <option>--Select--</option> 
                                        <option>HR</option> 
                                        <option>IT</option> 
                                        <option>Sales</option> 
                                        <option>Finance</option> 
                                    </select> 
                                </td> 
                            </tr> 
                            <tr> 
                                <td colspan='2' align='center'> 
                                    <input type='submit' value='Register'> 
                                    <input type='reset' value='Reset'> 
                                </td> 
                            </tr> 
                        </table> 
                    </form> 
                </body> 
                </html> 
            " width="400" height="300"> 
            </iframe> 
 
        </td> 
    </tr> 
    </table> 
</td> 
</tr> 
</table> 

</body> 
</html>
